<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearwing - Attack Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #graph-container {
            width: 100vw;
            height: 100vh;
        }
        .node {
            cursor: pointer;
            stroke: #333;
            stroke-width: 1.5px;
        }
        .node:hover {
            stroke: #fff;
            stroke-width: 2.5px;
        }
        .link {
            stroke: #666;
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
            fill: none;
            marker-end: url(#arrowhead);
        }
        .label {
            font-size: 10px;
            pointer-events: none;
            fill: #ccc;
        }
        #tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            max-width: 300px;
        }
        #tooltip h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #00ff00;
        }
        #tooltip p {
            margin: 0;
            font-size: 12px;
            color: #ccc;
            word-wrap: break-word;
        }
        #header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        #header h1 {
            margin: 0;
            font-size: 24px;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Clearwing // Attack Graph</h1>
    </div>

    <div id="tooltip"></div>

    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background: #ff4444;"></div> Target</div>
        <div class="legend-item"><div class="legend-color" style="background: #4444ff;"></div> Port</div>
        <div class="legend-item"><div class="legend-color" style="background: #44ff44;"></div> Service</div>
        <div class="legend-item"><div class="legend-color" style="background: #ffff44;"></div> Vulnerability (CVE)</div>
        <div class="legend-item"><div class="legend-color" style="background: #ff44ff;"></div> Exploit</div>
        <div class="legend-item"><div class="legend-color" style="background: #44ffff;"></div> Component</div>
        <div class="legend-item"><div class="legend-color" style="background: #ffffff;"></div> Credential</div>
    </div>

    <div id="graph-container"></div>

    <script>
        // Data injected here by Python
        const graphData = {{ graph_data | safe }};

        const width = window.innerWidth;
        const height = window.innerHeight;

        const colors = {
            "target": "#ff4444",
            "port": "#4444ff",
            "service": "#44ff44",
            "cve": "#ffff44",
            "exploit": "#ff44ff",
            "component": "#44ffff",
            "credential": "#ffffff",
            "unknown": "#999999"
        };

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => {
                container.attr("transform", event.transform);
            }));

        // Arrowhead definition
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 20)
            .attr("refY", 0)
            .attr("markerWidth", 6)
            .attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#666");

        const container = svg.append("g");

        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(40));

        const link = container.append("g")
            .attr("class", "links")
            .selectAll("path")
            .data(graphData.links)
            .enter().append("path")
            .attr("class", "link");

        const node = container.append("g")
            .attr("class", "nodes")
            .selectAll("circle")
            .data(graphData.nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", d => d.entity_type === "target" ? 12 : 8)
            .attr("fill", d => colors[d.entity_type] || colors.unknown)
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("mouseover", showTooltip)
            .on("mouseout", hideTooltip);

        const label = container.append("g")
            .attr("class", "labels")
            .selectAll("text")
            .data(graphData.nodes)
            .enter().append("text")
            .attr("class", "label")
            .attr("dy", 20)
            .attr("text-anchor", "middle")
            .text(d => d.id);

        simulation.on("tick", () => {
            link.attr("d", d => {
                const dx = d.target.x - d.source.x,
                      dy = d.target.y - d.source.y,
                      dr = Math.sqrt(dx * dx + dy * dy);
                return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
            });

            node.attr("cx", d => d.x)
                .attr("cy", d => d.y);

            label.attr("x", d => d.x)
                 .attr("y", d => d.y);
        });

        function showTooltip(event, d) {
            const tooltip = d3.select("#tooltip");
            tooltip.transition().duration(200).style("opacity", 0.9);
            
            let propertiesHtml = "";
            if (d.properties) {
                for (const [key, value] of Object.entries(d.properties)) {
                    propertiesHtml += `<strong>${key}:</strong> ${value}<br/>`;
                }
            }

            tooltip.html(`
                <h3>${d.entity_type.toUpperCase()}</h3>
                <p><strong>ID:</strong> ${d.id}</p>
                <p>${propertiesHtml}</p>
                <p style="font-size: 10px; margin-top: 5px; color: #666;">Created: ${d.created_at || 'N/A'}</p>
            `)
            .style("left", (event.pageX + 10) + "px")
            .style("top", (event.pageY - 28) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").transition().duration(500).style("opacity", 0);
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr("width", w).attr("height", h);
            simulation.force("center", d3.forceCenter(w / 2, h / 2)).restart();
        });
    </script>
</body>
</html>
