name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install package
        run: |
          uv pip install --system -e '.[dev]'

      - name: Ruff check
        run: ruff check clearwing/ tests/

      - name: Ruff format (check)
        run: ruff format --check clearwing/ tests/

      - name: Mypy scoped gate
        run: |
          mypy --follow-imports=silent \
            clearwing/findings \
            clearwing/sourcehunt \
            clearwing/capabilities.py \
            clearwing/agent/tools \
            clearwing/core

      - name: Run pytest
        run: python -m pytest -q --strict-markers --strict-config

      - name: Build wheel + sdist
        run: python -m build

      - name: Validate artifacts
        run: twine check dist/*
